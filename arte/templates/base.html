<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería de Arte</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        nav { background: #2c2c2c; padding: 15px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; }
        h1 { color: #2c2c2c; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0 15px 0; box-sizing: border-box; }
        button { background: #2c2c2c; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #555; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'inicio' %}">Inicio</a>
        <a href="{% url 'crear_artista' %}">Crear Artista</a>
        <a href="{% url 'crear_obra' %}">Crear Obra</a>
        <a href="{% url 'crear_movimiento' %}">Crear Movimiento</a>
        <a href="{% url 'buscar_artista' %}">Buscar Artista</a>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
